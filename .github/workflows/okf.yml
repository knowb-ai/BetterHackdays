name: OKF Contract

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-okf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate OKF contract
        run: python scripts/validate_okf.py
